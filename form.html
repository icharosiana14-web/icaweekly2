  <body>
    <body style="text-align: center;">
    <h2>
      FORM MAHASISWA 2026

    <div class="form-container">
    
    <form>
      
    
    Nama: <br>
    <input type="text" name="nama"><br><br>

   
    NIM: <br>
    <input type="number" name="nim"><br><br>

    
    Password: <br>
    <input type="password" name="password"><br><br>

    Email: <br>
    <input type="email" name="email"><br><br>

    
    No HP: <br>
    <input type="tel" name="nohp"><br><br>

    
    Website pribadi: <br>
    <input type="url" name="website"><br><br>

    
    Tanggal lahir: <br>
    <input type="date" name="ttl"><br><br>

    
    Warna favorit: <br>
    <input type="color" name="warna"><br><br>

    
    Tingkat kepuasan: <br>
    <input type="range" name="kepuasan" min="0" max="100"><br><br>

    
    Jenis kelamin: <br>
    <input type="radio" name="jk" value="laki"> Laki-laki
    <input type="radio" name="jk" value="perempuan"> Perempuan
    <br><br>

    
    Hobi: <br>
    <input type="checkbox" name="hobi" value="membaca"> Membaca<br>
    <input type="checkbox" name="hobi" value="olahraga"> Olahraga<br>
    <input type="checkbox" name="hobi" value="musik"> Musik<br>
    <br>

    
    Upload foto: <br>
    <input type="file" name="foto"><br><br>

    Alamat: <br>
    <textarea name="alamat" rows="4" cols="30"></textarea><br><br>

    
    Jurusan: <br>
    <select name="jurusan">
        <option value="informatika">Informatika</option>
        <option value="teknologi_informasi">Teknologi Informasi</option>
        <option value="teknik_sipil">Teknik Sipil</option>
    </select>
    <br><br>

    
    <input type="submit" value="Kirim">

</form>
</div>
</body>
</html>
